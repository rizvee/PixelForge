<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Animation Examples Gallery | 30+ Animations with Code — PixelForge</title>
  <meta name="description" content="Browse pure CSS animations with live preview and copy-paste code. Loaders, text effects, shape morphs, hover effects. Free CSS snippets.">
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/css-animations.css">
  <link rel="manifest" href="./manifest.json">
</head>
<body class="tool-layout">
  <header class="tool-nav">
    <a href="index.html" class="back-link">← Home</a>
    <h2>CSS Animations</h2>
    <div></div>
  </header>

  <div class="filter-bar">
    <div class="filter-tabs" id="category-tabs">
      <button class="active" data-cat="all">All</button>
      <button data-cat="loaders">Loaders</button>
      <button data-cat="text">Text</button>
      <button data-cat="shapes">Shapes</button>
      <button data-cat="hover">Hover</button>
      <button data-cat="transitions">Transitions</button>
    </div>
    
    <div class="filter-actions">
      <div class="nav-search" style="width: 250px;">
        <span>🔍</span>
        <input type="text" id="search-input" placeholder="Search by name...">
      </div>
      
      <div class="speed-control" style="display:flex; align-items:center; gap:8px;">
        <span style="font-size:0.9rem; color:var(--text-secondary)">Global Speed:</span>
        <input type="range" class="range" id="global-speed" min="0.25" max="4" step="0.25" value="1" style="width:100px;">
        <span id="speed-val" style="font-size:0.9rem; color:var(--text-primary); width:30px">1x</span>
      </div>
    </div>
  </div>

  <main class="gallery-container">
    <div class="masonry-grid" id="anim-grid">
      <!-- Cards rendered via JS -->
    </div>
  </main>

  <!-- Code Modal -->
  <div class="modal-backdrop" id="code-modal">
    <div class="modal-box" style="max-width: 800px;">
      <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
        <h3 id="modal-title">Animation Code</h3>
        <button class="btn-icon btn-sm" onclick="document.getElementById('code-modal').classList.remove('open')">✕</button>
      </div>
      
      <div class="code-tabs">
        <button class="code-tab active" data-target="html-code">HTML</button>
        <button class="code-tab" data-target="css-code">CSS</button>
      </div>
      
      <div class="code-content active" id="html-code">
        <pre><code id="code-block-html"></code></pre>
        <button class="btn btn-secondary btn-sm copy-btn" data-copy="html">Copy HTML</button>
      </div>
      
      <div class="code-content" id="css-code">
        <pre><code id="code-block-css"></code></pre>
        <button class="btn btn-secondary btn-sm copy-btn" data-copy="css">Copy CSS</button>
      </div>
      
      <div style="margin-top:24px; text-align:right;">
        <button class="btn btn-primary" id="btn-download-css">Download .css</button>
      </div>
    </div>
  </div>

  <script src="./js/global.js"></script>
  <script src="./js/css-animations.js"></script>
</body>
</html>
