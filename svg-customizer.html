<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG Customizer & Icon Maker Online — PixelForge</title>
  <meta name="description" content="Customize and download SVG icons online. Change colors, stroke width, and size. Copy raw SVG or export as PNG.">
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/svg-customizer.css">
  <link rel="manifest" href="./manifest.json">
</head>
<body class="tool-layout">
  <header class="tool-nav">
    <a href="index.html" class="back-link">← Home</a>
    <h2>SVG Customizer</h2>
    <div class="tool-nav-actions">
      <button class="btn btn-secondary btn-sm" id="btn-copy-svg">📋 Copy SVG</button>
      <button class="btn btn-primary btn-sm" id="btn-dl-svg">Download .svg</button>
      <button class="btn btn-secondary btn-sm" id="btn-dl-png">Download .png</button>
    </div>
  </header>

  <div class="app-container">
    <!-- Left Sidebar: Select Icon -->
    <aside class="left-sidebar panel">
      <div class="panel-section">
        <h3>Choose Template</h3>
        <div class="svg-grid" id="svg-grid">
          <!-- Populated by JS -->
        </div>
      </div>
    </aside>

    <!-- Center Workspace -->
    <main class="workspace">
      <div id="svg-preview-container" class="svg-preview-container">
        <!-- SVG injected here -->
      </div>
    </main>

    <!-- Right Sidebar: Controls -->
    <aside class="right-sidebar panel">
      <div class="panel-section">
        <h3>Global Settings</h3>
        
        <div class="control-group">
          <label>ViewBox Size: <span id="val-size">24</span></label>
          <input type="range" class="range w-full" id="param-size" min="16" max="1024" value="24">
        </div>
        
        <div class="control-group mt-3">
          <label>Fill Color:</label>
          <div style="display:flex; gap:8px">
            <input type="color" id="param-fill" class="input p-0" value="#7c3aed" style="width:40px;height:40px">
            <button class="btn btn-secondary flex-1" id="btn-fill-none">Set Transparent</button>
          </div>
        </div>

        <div class="control-group mt-3">
          <label>Stroke Color:</label>
          <div style="display:flex; gap:8px">
            <input type="color" id="param-stroke" class="input p-0" value="#06b6d4" style="width:40px;height:40px">
            <button class="btn btn-secondary flex-1" id="btn-stroke-none">Set Transparent</button>
          </div>
        </div>
        
        <div class="control-group mt-3">
          <label>Stroke Width: <span id="val-stroke-w">2px</span></label>
          <input type="range" class="range w-full" id="param-stroke-w" min="0" max="20" step="0.5" value="2">
        </div>
      </div>

      <div class="panel-section">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h3>Code Preview</h3>
        </div>
        <pre><code id="svg-code-out"></code></pre>
      </div>
    </aside>
  </div>

  <script src="./js/global.js"></script>
  <script src="./js/svg-customizer.js"></script>
</body>
</html>
