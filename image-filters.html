<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Filter App Online | Free Photo Effects — PixelForge</title>
  <meta name="description" content="Apply vintage, cinematic, and color filters to your photos online. Adjust brightness, contrast, hue and more. Free image editor.">
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/image-filters.css">
  <link rel="manifest" href="./manifest.json">
</head>
<body class="tool-layout">
  <header class="tool-nav">
    <a href="index.html" class="back-link">← Home</a>
    <h2>Image Filter App</h2>
    <div class="tool-nav-actions">
      <button class="btn btn-secondary btn-sm" id="btn-reset">Reset</button>
      <button class="btn btn-primary btn-sm" id="btn-export">Export Image</button>
    </div>
  </header>

  <div class="app-container">
    <main class="image-workspace" id="drop-zone">
      <div id="upload-overlay" class="upload-state">
        <div class="upload-box card">
          <div style="font-size:3rem; margin-bottom:16px;">📸</div>
          <h3 style="margin-bottom:8px">Upload Photo</h3>
          <p style="color:var(--text-secondary); margin-bottom:16px;">Drag & drop or click to apply filters.</p>
          <input type="file" id="file-input" accept="image/*" style="display:none">
          <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">Select Photo</button>
        </div>
      </div>
      
      <div id="img-container" class="img-container" style="display:none;">
        <div class="split-view" id="split-view">
          <img id="img-base" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Original">
          
          <div class="split-filtered" id="split-filtered">
            <img id="img-filtered" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Filtered">
          </div>
          
          <div class="split-slider" id="split-slider">
            <div class="split-handle" tabindex="0">⇹</div>
          </div>
        </div>
      </div>
    </main>

    <aside class="right-sidebar panel" id="sidebar">
      <div class="panel-section">
        <h3>Filter Presets</h3>
        <div class="preset-grid">
          <button class="preset-btn active" data-preset="none">
            <div class="preset-thumb" style="filter:none;"></div>
            <span>None</span>
          </button>
          <button class="preset-btn" data-preset="vintage">
            <div class="preset-thumb" style="filter:sepia(0.5) contrast(1.2) grayscale(0.2);"></div>
            <span>Vintage</span>
          </button>
          <button class="preset-btn" data-preset="cinematic">
            <div class="preset-thumb" style="filter:contrast(1.3) saturate(1.2) brightness(0.9);"></div>
            <span>Cinematic</span>
          </button>
          <button class="preset-btn" data-preset="noir">
            <div class="preset-thumb" style="filter:grayscale(1) contrast(1.5);"></div>
            <span>Noir</span>
          </button>
          <button class="preset-btn" data-preset="polaroid">
            <div class="preset-thumb" style="filter:sepia(0.3) saturate(1.4) hue-rotate(-10deg) contrast(1.1);"></div>
            <span>Polaroid</span>
          </button>
          <button class="preset-btn" data-preset="cyberpunk">
            <div class="preset-thumb" style="filter:hue-rotate(90deg) saturate(2) contrast(1.2);"></div>
            <span>Cyberpunk</span>
          </button>
        </div>
      </div>

      <div class="panel-section">
        <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
          <h3>Fine Tuning</h3>
          <div style="display:flex; align-items:center; gap:8px;">
            <label for="split-compare" style="font-size:0.8rem; color:var(--text-secondary)">Compare</label>
            <input type="checkbox" id="split-compare" checked>
          </div>
        </div>

        <div class="control-group">
          <label>Brightness: <span id="val-bright">100%</span></label>
          <input type="range" class="range w-full adj-slider" data-filter="brightness" data-unit="%" min="0" max="200" value="100">
        </div>
        <div class="control-group">
          <label>Contrast: <span id="val-contrast">100%</span></label>
          <input type="range" class="range w-full adj-slider" data-filter="contrast" data-unit="%" min="0" max="200" value="100">
        </div>
        <div class="control-group">
          <label>Saturation: <span id="val-saturate">100%</span></label>
          <input type="range" class="range w-full adj-slider" data-filter="saturate" data-unit="%" min="0" max="200" value="100">
        </div>
        <div class="control-group">
          <label>Grayscale: <span id="val-grayscale">0%</span></label>
          <input type="range" class="range w-full adj-slider" data-filter="grayscale" data-unit="%" min="0" max="100" value="0">
        </div>
        <div class="control-group">
          <label>Sepia: <span id="val-sepia">0%</span></label>
          <input type="range" class="range w-full adj-slider" data-filter="sepia" data-unit="%" min="0" max="100" value="0">
        </div>
        <div class="control-group">
          <label>Hue Rotate: <span id="val-hue">0deg</span></label>
          <input type="range" class="range w-full adj-slider" data-filter="hue-rotate" data-unit="deg" min="-180" max="180" value="0">
        </div>
        <div class="control-group">
          <label>Blur: <span id="val-blur">0px</span></label>
          <input type="range" class="range w-full adj-slider" data-filter="blur" data-unit="px" min="0" max="20" value="0">
        </div>
        <div class="control-group">
          <label>Invert: <span id="val-invert">0%</span></label>
          <input type="range" class="range w-full adj-slider" data-filter="invert" data-unit="%" min="0" max="100" value="0">
        </div>
      </div>
      
      <div class="panel-section" style="margin-top:auto">
        <h3>CSS Filter Code</h3>
        <pre><code id="css-code" style="font-family:var(--font-code); color:#a5b4fc; font-size:0.8rem; display:block; padding:8px; background:var(--bg-main); border-radius:4px; margin-top:8px;">filter: none;</code></pre>
        <button class="btn btn-secondary btn-sm w-full mt-2" onclick="PF.ui.copyToClipboard(document.getElementById('css-code').textContent)">Copy CSS</button>
      </div>

    </aside>
  </div>

  <script src="./js/global.js"></script>
  <script src="./js/image-filters.js"></script>
</body>
</html>
